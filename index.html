<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>表情符號大衝刺 - 極致明亮版</title>
    <style>
      :root {
        --neon-blue: #00d2ff;
      }
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #020205;
        font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        overflow: hidden;
        color: white;
      }
      #game-container {
        position: relative;
        box-shadow: 0 0 80px rgba(0, 210, 255, 0.3);
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      canvas {
        display: block;
        background: #05050f;
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="gameCanvas"></canvas>
    </div>

    <script>
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 450;
      canvas.height = 750;

      const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
      let currentState = STATE.MENU;

      let score = 0,
        lives = 2,
        hurtFrames = 0,
        items = [],
        lastItemTime = 0;
      let particles = [];
      let baseInterval = 600;

      const goodEmojis = ['⚡', '💎', '🔥', '🚀', '🌟', '👾', '🍀'];
      const badEmoji = '🚬';
      const minXDistance = 80;

      let basket = { width: 110, x: 170, y: canvas.height - 100, emoji: '📥' };

      for (let i = 0; i < 40; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 2,
          speed: 0.3 + Math.random(),
        });
      }

      function getLeaderboard() {
        const data = localStorage.getItem('emojiScores_bright');
        return data ? JSON.parse(data) : [];
      }

      function saveScore(newScore) {
        if (newScore <= 0) return;
        let scores = getLeaderboard();
        scores.push(newScore);
        scores.sort((a, b) => b - a);
        localStorage.setItem(
          'emojiScores_bright',
          JSON.stringify(scores.slice(0, 5))
        );
      }

      canvas.addEventListener('mousemove', (e) => {
        if (currentState !== STATE.PLAYING) return;
        const rect = canvas.getBoundingClientRect();
        const targetX = e.clientX - rect.left - basket.width / 2;
        basket.x += (targetX - basket.x) * 0.35;
        basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
      });

      canvas.addEventListener('mousedown', () => {
        if (currentState === STATE.MENU) startGame();
        else if (currentState === STATE.GAMEOVER) {
          saveScore(score);
          currentState = STATE.MENU;
        }
      });

      function spawnItem() {
        let x,
          speed,
          attempts = 0,
          isSafe = false;
        const speedMultiplier = 1 + score / 600;
        while (!isSafe && attempts < 20) {
          x = Math.random() * (canvas.width - 80) + 40;
          speed = (5 + Math.random() * 4) * speedMultiplier;
          isSafe = !items.some(
            (item) =>
              Math.abs(item.x - x) < minXDistance &&
              (speed > item.speed || Math.abs(item.y - -50) < 150)
          );
          attempts++;
        }
        const isBad = Math.random() < Math.min(0.5, 0.2 + score / 1500);
        items.push({
          x,
          y: -50,
          emoji: isBad
            ? badEmoji
            : goodEmojis[Math.floor(Math.random() * goodEmojis.length)],
          type: isBad ? 'bad' : 'good',
          speed,
          size: 45,
          angle: 0,
        });
      }

      function startGame() {
        score = 0;
        lives = 2;
        items = [];
        lastItemTime = 0;
        currentState = STATE.PLAYING;
      }

      function update(timestamp) {
        particles.forEach((p) => {
          p.y += p.speed;
          if (p.y > canvas.height) p.y = 0;
        });
        if (currentState !== STATE.PLAYING) return;
        let currentInterval = Math.max(130, baseInterval - score / 3.5);
        if (timestamp - lastItemTime > currentInterval) {
          spawnItem();
          lastItemTime = timestamp;
        }
        basket.width = Math.max(65, 110 - score / 20);
        if (hurtFrames > 0) hurtFrames--;
        for (let i = items.length - 1; i >= 0; i--) {
          const item = items[i];
          item.y += item.speed;
          item.angle += 0.05; // 用於光效閃爍
          if (
            item.y + 20 > basket.y &&
            item.x > basket.x - 25 &&
            item.x < basket.x + basket.width + 25
          ) {
            if (item.type === 'bad') {
              lives--;
              hurtFrames = 30;
            } else {
              score += 10;
            }
            items.splice(i, 1);
          } else if (item.y > canvas.height) {
            if (item.type === 'good') {
              lives--;
              hurtFrames = 30;
            }
            items.splice(i, 1);
          }
        }
        if (lives <= 0) currentState = STATE.GAMEOVER;
      }

      function draw() {
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        particles.forEach((p) => ctx.fillRect(p.x, p.y, p.size, p.size));

        if (currentState === STATE.MENU) drawMenu();
        else if (currentState === STATE.PLAYING) drawGame();
        else if (currentState === STATE.GAMEOVER) drawGameOver();
      }

      function drawMenu() {
        ctx.shadowBlur = 40;
        ctx.shadowColor = '#00d2ff';
        drawText('表情符號大衝刺', 'bold 44px Microsoft JhengHei', '#fff', 180);
        ctx.shadowBlur = 0;

        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
        drawRoundRect(50, 230, 350, 220, 15);
        ctx.fill();

        ctx.fillStyle = '#00d2ff';
        ctx.font = 'bold 20px Microsoft JhengHei';
        ctx.fillText('🏆 榮譽榜 (前五名) 🏆', canvas.width / 2, 270);

        const scores = getLeaderboard();
        scores.forEach((s, i) => {
          ctx.fillStyle = i === 0 ? '#ffeb3b' : '#fff';
          ctx.font = 'bold 18px Courier New';
          ctx.textAlign = 'left';
          ctx.fillText(`第 ${i + 1} 名`, 100, 315 + i * 30);
          ctx.textAlign = 'right';
          ctx.fillText(`${s} 分`, 350, 315 + i * 30);
        });

        const pulse = Math.sin(Date.now() / 150) * 8;
        ctx.textAlign = 'center';
        drawText(
          '點擊畫面 開始挑戰',
          'bold 26px Microsoft JhengHei',
          '#00d2ff',
          550 + pulse
        );
      }

      function drawGame() {
        // 籃子發光
        ctx.save();
        ctx.shadowColor = hurtFrames > 0 ? 'red' : '#00d2ff';
        ctx.shadowBlur = 25;
        if (hurtFrames > 0) ctx.translate(Math.random() * 10 - 5, 0);
        ctx.font = `${basket.width * 0.7}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(basket.emoji, basket.x + basket.width / 2, basket.y + 45);
        ctx.restore();

        // 核心：超亮 Emoji 繪製
        items.forEach((item) => {
          ctx.save();
          const glow = 20 + Math.sin(item.angle) * 10; // 動態閃爍光暈

          // 1. 底層大範圍強光 (Bloom)
          ctx.shadowBlur = glow;
          ctx.shadowColor = item.type === 'bad' ? '#ff0044' : '#ffffff';
          ctx.globalCompositeOperation = 'lighter'; // 色彩加強模式
          ctx.font = '45px Arial';
          ctx.textAlign = 'center';
          ctx.fillText(item.emoji, item.x, item.y);

          // 2. 頂層實體核心
          ctx.shadowBlur = 5;
          ctx.globalCompositeOperation = 'source-over';
          ctx.fillText(item.emoji, item.x, item.y);
          ctx.restore();
        });

        // UI 介面
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, 70);
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00d2ff';
        ctx.fillStyle = '#00d2ff';
        ctx.font = 'bold 22px Courier New';
        ctx.textAlign = 'left';
        ctx.fillText(`分數: ${score.toString().padStart(5, '0')}`, 25, 45);
        ctx.textAlign = 'right';
        ctx.fillText(lives === 2 ? '❤️ ❤️' : '❤️ 🖤', canvas.width - 25, 45);
        ctx.shadowBlur = 0;
      }

      function drawGameOver() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.95)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.shadowBlur = 35;
        ctx.shadowColor = '#ff0044';
        drawText('挑戰失敗', 'bold 50px Microsoft JhengHei', '#ff1744', 300);
        ctx.shadowBlur = 0;
        drawText(
          `最終得分: ${score}`,
          'bold 28px Microsoft JhengHei',
          '#fff',
          380
        );
        drawText(
          '點擊畫面 回到選單',
          '20px Microsoft JhengHei',
          '#00d2ff',
          500
        );
      }

      function drawText(txt, font, color, y) {
        ctx.fillStyle = color;
        ctx.font = font;
        ctx.textAlign = 'center';
        ctx.fillText(txt, canvas.width / 2, y);
      }

      function drawRoundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function loop(timestamp) {
        update(timestamp);
        draw();
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
