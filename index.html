<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hkscиЎЁжғ…з¬ҰиҷҹиЎқеҲә</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-blue: #00d2ff; }
        body { 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #020205; 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            overflow: hidden; color: white;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 80px rgba(0, 210, 255, 0.3);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        canvas { display: block; background: #050510; cursor: crosshair; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    // ==========================================
    // 1. Supabase еҲқе§ӢеҢ– (и«ӢжӣҙжҸӣзӮәдҪ зҡ„йҮ‘й‘°)
    // ==========================================
    const SUPABASE_URL = 'https://pvpbzcoozenjfwsfuhpc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_mUOpOcraYcXbjl3jVlxzpg_h4Fp7tWl';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 450;
    canvas.height = 750;

    // йҒҠжҲІзӢҖж…Ӣ
    const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
    let currentState = STATE.MENU;

    let score = 0, lives = 2, hurtFrames = 0, items = [], lastItemTime = 0;
    let particles = []; 
    let globalScores = []; // еӯҳе„Іе…ЁзҗғжҺ’иЎҢ
    let isUploading = false;

    const goodEmojis = ['рҹҗҲвҖҚв¬ӣ', 'рҹҺј', 'рҹ”Ҙ', 'рҹҺё', 'рҹ§‘вҖҚрҹҚі', 'рҹҺЁ', 'рҹӘЎ'];
    const badEmoji = 'рҹҡ¬';
    let basket = { width: 110, x: 170, y: canvas.height - 100, emoji: 'рҹ“Ҙ' };

    // еҲқе§ӢеҢ–жҳҹз©әиғҢжҷҜ
    for(let i=0; i<40; i++) {
        particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: 0.3 + Math.random() });
    }

    // ==========================================
    // 2. иіҮж–ҷеә«дә’еӢ•еҠҹиғҪ
    // ==========================================
    async function fetchTopScores() {
        try {
            const { data, error } = await supabaseClient
                .from('leaderboard')
                .select('point')
                .order('point', { ascending: false })
                .limit(5);
            if (error) throw error;
            globalScores = data.map(d => d.point);
        } catch (err) {
            console.error("з„Ўжі•и®ҖеҸ–жҺ’иЎҢжҰң:", err.message);
        }
    }

    async function uploadScore(finalScore) {
        if (finalScore <= 0 || isUploading) return;
        isUploading = true;
        try {
            const { error } = await supabaseClient
                .from('leaderboard')
                .insert([{ point: finalScore }]);
            if (error) throw error;
            await fetchTopScores(); // жҲҗеҠҹеҫҢз«ӢеҚіеҗҢжӯҘжӣҙж–°
        } catch (err) {
            console.error("дёҠеӮіеӨұж•—:", err.message);
        } finally {
            isUploading = false;
        }
    }

    // ==========================================
    // 3. йҒҠжҲІйӮҸијҜиҲҮијёе…Ҙ
    // ==========================================
    canvas.addEventListener('mousemove', (e) => {
        if (currentState !== STATE.PLAYING) return;
        const rect = canvas.getBoundingClientRect();
        const targetX = (e.clientX - rect.left) - basket.width / 2;
        basket.x += (targetX - basket.x) * 0.35;
        basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
    });

    canvas.addEventListener('mousedown', async () => {
        if (currentState === STATE.MENU) {
            score = 0; lives = 2; items = []; 
            currentState = STATE.PLAYING;
        } else if (currentState === STATE.GAMEOVER) {
            if (!isUploading) {
                await uploadScore(score);
                currentState = STATE.MENU;
            }
        }
    });

    function spawnItem() {
        const speedMultiplier = 1 + (score / 600);
        const x = Math.random() * (canvas.width - 80) + 40;
        const isBad = Math.random() < Math.min(0.5, 0.2 + (score/1500));
        items.push({ 
            x, y: -50, 
            emoji: isBad ? badEmoji : goodEmojis[Math.floor(Math.random() * goodEmojis.length)], 
            type: isBad ? 'bad' : 'good', 
            speed: (5 + Math.random() * 4) * speedMultiplier,
            angle: 0
        });
    }

    function update(timestamp) {
        particles.forEach(p => { p.y += p.speed; if(p.y > canvas.height) p.y = 0; });
        if (currentState !== STATE.PLAYING) return;

        let currentInterval = Math.max(130, 600 - (score / 3.5));
        if (timestamp - lastItemTime > currentInterval) { spawnItem(); lastItemTime = timestamp; }

        basket.width = Math.max(65, 110 - (score / 20));
        if (hurtFrames > 0) hurtFrames--;

        for (let i = items.length - 1; i >= 0; i--) {
            const item = items[i];
            item.y += item.speed;
            item.angle += 0.1;
            if (item.y + 20 > basket.y && item.x > basket.x - 25 && item.x < basket.x + basket.width + 25) {
                if (item.type === 'bad') { lives--; hurtFrames = 30; } else { score += 10; }
                items.splice(i, 1);
            } else if (item.y > canvas.height) {
                if (item.type === 'good') { lives--; hurtFrames = 30; }
                items.splice(i, 1);
            }
        }
        if (lives <= 0) currentState = STATE.GAMEOVER;
    }

    // ==========================================
    // 4. з№ӘиЈҪиҰ–иҰә
    // ==========================================
    function draw() {
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        particles.forEach(p => ctx.fillRect(p.x, p.y, p.size, p.size));

        if (currentState === STATE.MENU) drawMenu();
        else if (currentState === STATE.PLAYING) drawGame();
        else if (currentState === STATE.GAMEOVER) drawGameOver();
    }

    function drawMenu() {
        ctx.shadowBlur = 35; ctx.shadowColor = "#00d2ff";
        drawText('hksc emojiиЎқеҲә', 'bold 44px Microsoft JhengHei', '#fff', 180);
        ctx.shadowBlur = 0;

        ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
        ctx.beginPath(); ctx.roundRect(50, 230, 350, 220, 15); ctx.fill();

        ctx.fillStyle = "#00d2ff"; ctx.font = "bold 20px Microsoft JhengHei";
        ctx.fillText("рҹҢҚ е…Ёзҗғ Top 5 жҺ’иЎҢжҰң рҹҸҶ", canvas.width / 2, 270);

        if (globalScores.length === 0) {
            ctx.fillStyle = "#666"; ctx.fillText("жӯЈеңЁеҗҢжӯҘж•ёж“ҡ...", canvas.width/2, 340);
        } else {
            globalScores.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? "#ffeb3b" : "#fff";
                ctx.font = "bold 18px Courier New"; ctx.textAlign = "left";
                ctx.fillText(`TOP ${i+1}`, 100, 315 + i * 30);
                ctx.textAlign = "right"; ctx.fillText(`${s} PTS`, 350, 315 + i * 30);
            });
        }
        const pulse = Math.sin(Date.now() / 150) * 8; ctx.textAlign = "center";
        drawText('й»һж“Ҡз•«йқў й–Ӣе§ӢжҢ‘жҲ°', 'bold 26px Microsoft JhengHei', '#00d2ff', 550 + pulse);
    }

    function drawGame() {
        ctx.save();
        ctx.shadowColor = hurtFrames > 0 ? "red" : "#00d2ff"; ctx.shadowBlur = 20;
        if (hurtFrames > 0) ctx.translate(Math.random()*8-4, 0);
        ctx.font = `${basket.width * 0.7}px Arial`; ctx.textAlign = 'center';
        ctx.fillText(basket.emoji, basket.x + basket.width / 2, basket.y + 45);
        ctx.restore();

        items.forEach(item => {
            ctx.save();
            ctx.shadowBlur = 25 + Math.sin(item.angle)*10;
            ctx.shadowColor = item.type === 'bad' ? '#ff0044' : '#ffffff';
            ctx.globalCompositeOperation = 'lighter';
            ctx.font = '45px Arial'; ctx.textAlign = 'center';
            ctx.fillText(item.emoji, item.x, item.y);
            ctx.restore();
        });

        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, canvas.width, 70);
        ctx.fillStyle = '#00ffcc'; ctx.font = 'bold 22px Courier New'; ctx.textAlign = 'left';
        ctx.fillText(`SCORE: ${score.toString().padStart(5, '0')}`, 25, 45);
        ctx.textAlign = 'right'; ctx.fillText(lives === 2 ? 'вқӨпёҸ вқӨпёҸ' : 'вқӨпёҸ рҹ–Ө', canvas.width - 25, 45);
    }

    function drawGameOver() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.95)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.shadowBlur = 30; ctx.shadowColor = "#ff0044";
        drawText('жҢ‘жҲ°еӨұж•—', 'bold 50px Microsoft JhengHei', '#ff1744', 300);
        ctx.shadowBlur = 0;
        drawText(`жң¬ж¬Ўеҫ—еҲҶ: ${score}`, 'bold 28px Microsoft JhengHei', '#fff', 380);
        drawText(isUploading ? 'жӯЈеңЁдёҠеӮіеҲҶж•ё...' : 'й»һж“Ҡе„ІеӯҳдёҰеӣһеҲ°йҒёе–®', '20px Microsoft JhengHei', '#00d2ff', 500);
    }

    function drawText(t, f, c, y) { ctx.fillStyle = c; ctx.font = f; ctx.textAlign = 'center'; ctx.fillText(t, canvas.width/2, y); }

    function loop(t) { update(t); draw(); requestAnimationFrame(loop); }
    
    // еҲқе§ӢеҢ–еҗҢжӯҘдёҰе•ҹеӢ•
    fetchTopScores();
    setInterval(fetchTopScores, 15000); // жҜҸ 15 з§’еҗҢжӯҘдёҖж¬Ў
    requestAnimationFrame(loop);
</script>

</body>
</html>
